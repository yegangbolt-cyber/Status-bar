name: Build APK From Zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Unzip project
        run: unzip FixedStatusBarOverlay_MobileCloudBuild_v2.zip

      - name: Build Debug APK
        run: |
          cd FixedStatusBarOverlay_MobileCloudBuild
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FixedStatusBarOverlay-debug-apk
          path: FixedStatusBarOverlay_MobileCloudBuild/app/build/outputs/apk/debug/*.apk
